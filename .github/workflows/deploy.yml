name: Deploy Flask

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main
      

jobs:

  deploy:

    runs-on: self-hosted

    steps:

      - uses: actions/checkout@v4

      - name: Build Image
        run: |
          docker build -t employee-app:latest .

      - name: Stop Existing
        run: |
          docker rm -f employee-app || true

      - name: Run Container
        run: |
          docker run -d \
          --name employee-app \
          -p 5000:5000 \
          employee-app:latest